"<!DOCTYPE html>
<html lang=\"en\">
<head>
  <meta charset=\"UTF-8\" />
  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\" />
  <title>Chinna Gaming · Double Coin Toss</title>
  <link rel=\"stylesheet\" href=\"style.css\" />
  <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">
  <link href=\"https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap\" rel=\"stylesheet\">
  <link rel=\"stylesheet\" href=\"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css\" />
  <style>
    .double-stage { display:flex; gap:20px; justify-content:center; align-items:center; height:230px; }
    .coin.small { width: 100px; height: 100px; }
    .coin.small .face { font-size: 28px; border-width: 3px; }
    .pick-row.four { grid-template-columns: 1fr 1fr 1fr 1fr; }
    .pick-card.compact { padding: 10px 4px; }
    .pick-card.compact h5 { font-size: 14px; }
  </style>
</head>
<body>
  <div class=\"app\" data-testid=\"double-coin-page\">
    <div class=\"page-head\">
      <a class=\"back-btn\" href=\"games.html\"><i class=\"fa-solid fa-arrow-left\"></i></a>
      <h2>Double Coin</h2>
      <div class=\"flex-1\"></div>
      <span class=\"tag gold\">💰 <span id=\"balPill\">0</span></span>
    </div>

    <div class=\"double-stage\">
      <div class=\"coin small\" id=\"c1\"><div class=\"face front\">H</div><div class=\"face back\">T</div></div>
      <div class=\"coin small\" id=\"c2\"><div class=\"face front\">H</div><div class=\"face back\">T</div></div>
    </div>

    <p class=\"text-sm muted center mb-12\" id=\"resultText\">Predict both coins (3.8× win)</p>

    <div class=\"pick-row four\">
      <div class=\"pick-card compact\" data-pick=\"HH\" data-testid=\"pick-HH\"><h5>HH</h5><span>3.8×</span></div>
      <div class=\"pick-card compact\" data-pick=\"HT\" data-testid=\"pick-HT\"><h5>HT</h5><span>3.8×</span></div>
      <div class=\"pick-card compact\" data-pick=\"TH\" data-testid=\"pick-TH\"><h5>TH</h5><span>3.8×</span></div>
      <div class=\"pick-card compact\" data-pick=\"TT\" data-testid=\"pick-TT\"><h5>TT</h5><span>3.8×</span></div>
    </div>

    <div class=\"glass mt-16\">
      <label class=\"label\">Bet Amount</label>
      <div class=\"bet-chips\">
        <button class=\"chip\" data-bet=\"10\">10</button>
        <button class=\"chip\" data-bet=\"50\">50</button>
        <button class=\"chip\" data-bet=\"100\">100</button>
        <button class=\"chip\" data-bet=\"500\">500</button>
        <button class=\"chip\" data-bet=\"1000\">1K</button>
      </div>
      <input type=\"number\" class=\"input mt-8\" id=\"bet\" placeholder=\"Custom amount\"/>
      <button class=\"btn btn-primary mt-12\" id=\"playBtn\" data-testid=\"play-double-btn\">
        <i class=\"fa-solid fa-circle-play\"></i> &nbsp;PLAY
      </button>
    </div>
  </div>

  <script type=\"module\">
    import {
      requireAuth, getUserData, db, doc, updateDoc, increment, addDoc, collection,
      serverTimestamp, logTransaction
    } from \"./firebase.js\";
    import { bottomNav, toast, fmtCoins } from \"./script.js\";
    bottomNav(\"games\");

    let pick = null, bet = 0, balance = 0, user = null;

    requireAuth(async (u) => {
      user = u;
      const { wallet } = await getUserData(u.uid);
      balance = wallet?.balance || 0;
      document.getElementById(\"balPill\").textContent = fmtCoins(balance);
    });

    document.querySelectorAll(\".pick-card\").forEach(c => c.addEventListener(\"click\", () => {
      document.querySelectorAll(\".pick-card\").forEach(x => x.classList.remove(\"selected\"));
      c.classList.add(\"selected\"); pick = c.dataset.pick;
    }));
    document.querySelectorAll(\".chip\").forEach(c => c.addEventListener(\"click\", () => {
      document.querySelectorAll(\".chip\").forEach(x => x.classList.remove(\"active\"));
      c.classList.add(\"active\"); bet = parseInt(c.dataset.bet);
      document.getElementById(\"bet\").value = bet;
    }));
    document.getElementById(\"bet\").addEventListener(\"input\", e => bet = parseInt(e.target.value || 0));

    document.getElementById(\"playBtn\").addEventListener(\"click\", async () => {
      if (!pick) return toast(\"Pick a combination\", \"error\");
      if (!bet || bet < 10) return toast(\"Min bet 10 coins\", \"error\");
      if (bet > balance) return toast(\"Insufficient balance\", \"error\");

      const c1 = document.getElementById(\"c1\"), c2 = document.getElementById(\"c2\");
      c1.classList.add(\"spinning\"); c2.classList.add(\"spinning\");
      document.getElementById(\"playBtn\").disabled = true;
      document.getElementById(\"resultText\").textContent = \"Tossing...\";

      const r1 = Math.random() < 0.5 ? \"H\" : \"T\";
      const r2 = Math.random() < 0.5 ? \"H\" : \"T\";
      const result = r1 + r2;
      const win = result === pick;
      const reward = win ? Math.floor(bet * 3.8) : 0;

      setTimeout(async () => {
        c1.classList.remove(\"spinning\");
        c2.classList.remove(\"spinning\");
        c1.style.transform = r1 === \"H\" ? \"rotateY(0deg)\" : \"rotateY(180deg)\";
        c2.style.transform = r2 === \"H\" ? \"rotateY(0deg)\" : \"rotateY(180deg)\";

        const net = win ? (reward - bet) : -bet;
        balance += net;
        document.getElementById(\"balPill\").textContent = fmtCoins(balance);
        await updateDoc(doc(db, \"wallets\", user.uid), { balance: increment(net), xp: increment(Math.abs(bet)/10) });
        await addDoc(collection(db, \"gameHistory\"), {
          uid: user.uid, game: \"double-coin\", pick, result, bet, win, reward, createdAt: serverTimestamp()
        });
        await logTransaction(user.uid, win ? \"win\" : \"loss\", win ? reward : bet, `Double Coin · ${result}`);

        document.getElementById(\"resultText\").innerHTML = win
          ? `<span style=\"color:var(--green)\">🎉 ${result}! You Won +${fmtCoins(reward)}</span>`
          : `<span style=\"color:var(--red)\">😢 Result ${result} · -${fmtCoins(bet)}</span>`;
        document.getElementById(\"playBtn\").disabled = false;
      }, 1900);
    });
  </script>
</body>
</html>
"
