"<!DOCTYPE html>
<html lang=\"en\">
<head>
  <meta charset=\"UTF-8\" />
  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\" />
  <title>Chinna Gaming · Forgot Password</title>
  <link rel=\"stylesheet\" href=\"style.css\" />
  <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">
  <link href=\"https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap\" rel=\"stylesheet\">
  <link rel=\"stylesheet\" href=\"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css\" />
</head>
<body>
  <div class=\"auth-wrap\">
    <div class=\"auth-logo\"><i class=\"fa-solid fa-key\"></i></div>
    <h1 class=\"auth-title\">Reset Password</h1>
    <p class=\"auth-sub\">Enter your email to receive a reset link</p>

    <form id=\"resetForm\" class=\"glass\" data-testid=\"forgot-form\">
      <div class=\"form-group\">
        <label class=\"label\">Email</label>
        <input type=\"email\" class=\"input\" id=\"email\" required data-testid=\"forgot-email-input\"/>
      </div>
      <button type=\"submit\" class=\"btn btn-primary\" data-testid=\"forgot-submit-btn\">
        <i class=\"fa-solid fa-paper-plane\"></i> &nbsp;Send Reset Link
      </button>
    </form>

    <p class=\"auth-foot\"><a href=\"index.html\"><i class=\"fa-solid fa-arrow-left\"></i> Back to Sign In</a></p>
  </div>

  <script type=\"module\">
    import { auth, sendPasswordResetEmail } from \"./firebase.js\";
    import { toast } from \"./script.js\";

    document.getElementById(\"resetForm\").addEventListener(\"submit\", async (e) => {
      e.preventDefault();
      const email = document.getElementById(\"email\").value.trim();
      try {
        await sendPasswordResetEmail(auth, email);
        toast(\"Reset link sent to your email ✉️\", \"success\");
      } catch (err) { toast(err.message.replace(\"Firebase: \", \"\"), \"error\"); }
    });
  </script>
</body>
</html>
"
